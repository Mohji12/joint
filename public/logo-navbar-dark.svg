<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <!-- Jointlly Navbar Logo — DARK VARIANT -->
  <!-- Use on: green navbar (#1A5C35), dark backgrounds -->
  <!-- Background: transparent -->

  <!-- J-LEFT: White -->
  <rect x="8" y="10" width="18" height="36" rx="3" fill="white"/>
  <rect x="8" y="6"  width="7"  height="8"  rx="2" fill="white" opacity="0.85"/>
  <rect x="18" y="7" width="5"  height="7"  rx="1" fill="white" opacity="0.45"/>
  <path d="M17 46 Q17 58 11 60 Q5 62 2 54 Q0 48 2 44"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- J-RIGHT: Gold -->
  <rect x="26" y="7"  width="18" height="39" rx="3" fill="#C9952A"/>
  <rect x="26" y="3"  width="7"  height="8"  rx="2" fill="#C9952A"/>
  <rect x="36" y="4"  width="5"  height="7"  rx="1" fill="#C9952A" opacity="0.5"/>
  <path d="M35 46 Q35 59 29 61 Q23 63 20 55 Q18 49 20 45"
        fill="none" stroke="#C9952A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Overlap -->
  <rect x="26" y="10" width="9" height="36" rx="0" fill="#0D2B18"/>

  <!-- Wordmark white -->
  <text x="52" y="42"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="30" font-weight="300" letter-spacing="1.5"
    fill="white">jointlly</text>
</svg>
